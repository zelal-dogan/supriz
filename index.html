<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sürpriz Hediye!</title>
    <style>
        body { background-color: #000; color: white; text-align: center; font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #scare-ui { display: block; }
        #jumpscare { display: none; width: 100vw; height: 100vh; object-fit: cover; position: fixed; top: 0; left: 0; }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #222; color: #fff; border: 2px solid #fff; border-radius: 10px; }

        /* Titreme efekti burası */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shaking { animation: shake 0.1s infinite; }
    </style>
</head>
<body>

    <div id="scare-ui">
        <h1>SESİ FULLE</h1>
        <br>
        <button onclick="startPrank()">TIKLA</button>
    </div>

    <img id="jumpscare" src="Beşar Esad_ “Suriye’yi terk etmek istememiştim”.jpeg" alt="Boo!">

    <audio id="scare-sound" src="Allah,Suri ya Beşşar (Bass Boosted) [-biG4KYQ3gE].mp3"></audio>

    <script>
        function startPrank() {
            document.getElementById('scare-ui').style.display = 'none';
            
            const img = document.getElementById('jumpscare');
            img.style.display = 'block';
            img.classList.add('shaking'); // Titremeyi başlatan satır

            const audio = document.getElementById('scare-sound');
            audio.volume = 1.0;
            audio.play();

            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
        }
    </script>
</body>
</html>
